<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认知提升（阅读） · 2026年度计划</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=JetBrains+Mono:wght@300;400;500&display=swap');
        :root {
            --bg: #0a0f0f;
            --fg: #d0e8e8;
            --muted: #4a7a7a;
            --accent: #1abc9c;
            --card: rgba(10,15,15,0.95);
            --border: rgba(255,255,255,0.08);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--fg);min-height:100vh}
        .bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(26,188,156,0.12) 0%,transparent 50%),radial-gradient(ellipse 80% 40% at 20% 100%,rgba(22,160,136,0.1) 0%,transparent 50%),var(--bg)}
        .bg::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:50px 50px}
        .container{max-width:1100px;margin:0 auto;padding:32px 24px}
        .back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--muted);text-decoration:none;font-size:13px;padding:10px 0;margin-bottom:24px;transition:color 0.3s}
        .back-btn:hover{color:var(--accent)}
        .back-btn svg{width:16px;height:16px;transition:transform 0.3s}
        .back-btn:hover svg{transform:translateX(-4px)}
        .hero-split{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:40px}
        @media(max-width:768px){.hero-split{grid-template-columns:1fr}}
        .hero-left{display:flex;flex-direction:column;justify-content:center}
        .hero-badge{display:inline-flex;align-items:center;gap:10px;font-size:12px;font-weight:500;color:var(--accent);background:rgba(26,188,156,0.1);border:1px solid rgba(26,188,156,0.2);padding:8px 16px;border-radius:100px;width:fit-content;margin-bottom:20px}
        .hero-badge::before{content:'';width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .hero-left h1{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,48px);font-weight:800;letter-spacing:-.02em;line-height:1.2;margin-bottom:12px}
        .hero-left p{font-size:15px;color:var(--muted);line-height:1.7}
        .hero-right{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
        .stat-square{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;backdrop-filter:blur(10px)}
        .stat-square:nth-child(1){border-color:rgba(26,188,156,.3)}
        .stat-square:nth-child(2){border-color:rgba(22,160,136,.3)}
        .stat-square:nth-child(3){border-color:rgba(18,132,112,.3)}
        .stat-square:nth-child(4){border-color:rgba(14,104,88,.3)}
        .stat-label-sm{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
        .stat-value-sm{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:var(--fg)}
        .stat-desc{font-size:11px;color:var(--muted);margin-top:8px}
        .content-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
        @media(max-width:900px){.content-grid{grid-template-columns:1fr}}
        .content-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;backdrop-filter:blur(10px);transition:all .4s}
        .content-card:hover{border-color:rgba(26,188,156,.3);box-shadow:0 0 40px rgba(26,188,156,.1)}
        .content-card.full-width{grid-column:1 / -1}
        .card-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
        .card-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:18px;background:linear-gradient(135deg,rgba(26,188,156,.2),rgba(22,160,136,.1));border-radius:12px;border:1px solid rgba(26,188,156,.2)}
        .card-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600}
        .card-body{padding-left:52px}
        .field-label{font-size:11px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:10px;display:block}
        .field-content{width:100%;min-height:50px;padding:12px 16px;background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:10px;color:var(--fg);font-size:14px;line-height:1.7;transition:all .3s;cursor:text}
        .field-content:focus{outline:none;border-color:var(--accent);background:rgba(26,188,156,.05)}
        .mit-list{list-style:none}
        .mit-item{display:grid;grid-template-columns:auto 1fr;gap:12px;padding:14px 0;border-bottom:1px solid var(--border);align-items:start}
        .mit-item:last-child{border-bottom:none}
        .mit-checkbox{appearance:none;width:20px;height:20px;border:2px solid var(--border);border-radius:6px;cursor:pointer;position:relative;transition:all .3s;margin-top:2px}
        .mit-checkbox:checked{background:var(--accent);border-color:var(--accent)}
        .mit-checkbox:checked::after{content:'';position:absolute;left:5px;top:2px;width:5px;height:10px;border:solid var(--bg);border-width:0 2px 2px 0;transform:rotate(45deg)}
        .mit-checkbox:hover{border-color:var(--accent)}
        .mit-text{font-size:14px;line-height:1.6;padding:4px 12px;border-radius:8px;transition:all .3s;cursor:text;border:1px solid transparent}
        .mit-checkbox:checked+.mit-text{text-decoration:line-through;color:var(--muted);background:rgba(26,188,156,.1)}
        .mit-text:focus{outline:none;background:rgba(26,188,156,.1);border-color:var(--accent)}
        .progress-bar{height:4px;background:rgba(255,255,255,.05);border-radius:2px;margin-top:20px;overflow:hidden}
        .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease;width:0%}
        .save-hint{text-align:center;font-size:12px;color:var(--muted);margin-top:24px;opacity:0;transition:opacity .5s}
        .save-hint.show{opacity:1}
        .nav-footer{display:flex;justify-content:space-between;align-items:center;margin-top:32px;padding-top:24px;border-top:1px solid var(--border)}
        .home-btn{display:flex;align-items:center;gap:8px;color:var(--accent);text-decoration:none;font-size:14px;padding:10px 20px;border:1px solid rgba(26,188,156,.3);border-radius:100px;transition:all .3s}
        .home-btn:hover{background:rgba(26,188,156,.1)}
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <a href="index.html" class="back-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            返回总览
        </a>
        <div class="hero-split">
            <div class="hero-left">
                <div class="hero-badge">维度 8 · 认知提升（阅读）</div>
                <h1>认知提升（阅读）</h1>
                <p>重新建立稳定的阅读习惯，让阅读成为撬动其他目标的杠杆。通过深度阅读拓展思维边界，提升认知层次。</p>
            </div>
            <div class="hero-right">
                <div class="stat-square"><div class="stat-label-sm">愿景句</div><div class="stat-value-sm">📚 稳定阅读</div><div class="stat-desc">习惯杠杆</div></div>
                <div class="stat-square"><div class="stat-label-sm">Q2成果</div><div class="stat-value-sm">📖 6本书</div><div class="stat-desc">每本笔记</div></div>
                <div class="stat-square"><div class="stat-label-sm">当前进度</div><div class="stat-value-sm" id="progressVal">0%</div><div class="stat-desc">任务完成率</div></div>
                <div class="stat-square"><div class="stat-label-sm">关键指标</div><div class="stat-value-sm">💡 核心收获</div><div class="stat-desc">影响决策</div></div>
            </div>
        </div>
        <div class="content-grid">
            <div class="content-card"><div class="card-header"><div class="card-icon">🎯</div><div class="card-title">愿景句</div></div><div class="card-body"><textarea class="field-content" id="vision"></textarea></div></div>
            <div class="content-card"><div class="card-header"><div class="card-icon">🚀</div><div class="card-title">Q2杠杆成果</div></div><div class="card-body"><textarea class="field-content" id="leverage"></textarea></div></div>
            <div class="content-card"><div class="card-header"><div class="card-icon">📊</div><div class="card-title">关键指标</div></div><div class="card-body"><textarea class="field-content" id="kpi"></textarea></div></div>
            <div class="content-card full-width">
                <div class="card-header"><div class="card-icon">✅</div><div class="card-title">每周MIT举例</div></div>
                <div class="card-body">
                    <ul class="mit-list" id="mitList">
                        <li class="mit-item"><input type="checkbox" class="mit-checkbox" data-index="0"><div class="mit-text" contenteditable="true" data-index="0">每日阅读30分钟，标注关键观点</div></li>
                        <li class="mit-item"><input type="checkbox" class="mit-checkbox" data-index="1"><div class="mit-text" contenteditable="true" data-index="1">周末完成当周阅读内容的简短笔记（核心观点+个人关联）</div></li>
                        <li class="mit-item"><input type="checkbox" class="mit-checkbox" data-index="2"><div class="mit-text" contenteditable="true" data-index="2">每两周选定下一本书，确保书单与当前最重要的目标方向对齐</div></li>
                    </ul>
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                </div>
            </div>
        </div>
        <div class="save-hint" id="saveHint">✨ 更改已自动保存</div>
        <div class="nav-footer">
            <a href="index.html" class="home-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                </svg>
                返回总览
            </a>
            <span style="font-size: 12px; color: var(--muted);">维度 8 / 8</span>
        </div>
    </div>
    <script>
        const DIM_ID = 8;
        let state = loadState();
        function loadState() { const saved = localStorage.getItem('plan2026_state'); return saved ? JSON.parse(saved) : { dimensions: {} }; }
        function saveState() { localStorage.setItem('plan2026_state', JSON.stringify(state)); }
        function updateProgress() {
            const dimState = state.dimensions[DIM_ID] || { completedMits: [] };
            const completed = dimState.completedMits ? dimState.completedMits.length : 0;
            const total = 3; const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
            document.getElementById('progressVal').textContent = pct + '%';
            document.getElementById('progressFill').style.width = pct + '%';
        }
        function init() {
            const dimState = state.dimensions[DIM_ID] || { completedMits: [] };
            document.getElementById('vision').value = dimState.vision || '重新建立稳定的阅读习惯，让阅读成为撬动其他目标的杠杆';
            document.getElementById('leverage').value = dimState.leverage || 'Q2完成6本书（每两周1本）；阅读方向聚焦市场与商业认知、AI与技术趋势、心理与自我认知三个领域，每本书输出一段核心收获笔记';
            document.getElementById('kpi').value = dimState.kpi || '6本书完成率100%；每本书有不少于200字的笔记，明确写出"这本书如何影响了我的某个具体目标或决策"';
            const checkboxes = document.querySelectorAll('.mit-checkbox');
            const texts = document.querySelectorAll('.mit-text');
            checkboxes.forEach(cb => {
                const idx = parseInt(cb.dataset.index);
                cb.checked = dimState.completedMits && dimState.completedMits.includes(idx);
                cb.addEventListener('change', () => {
                    if (!state.dimensions[DIM_ID]) state.dimensions[DIM_ID] = { completedMits: [], vision: '', leverage: '', kpi: '' };
                    if (cb.checked) {
                        if (!state.dimensions[DIM_ID].completedMits) state.dimensions[DIM_ID].completedMits = [];
                        if (!state.dimensions[DIM_ID].completedMits.includes(idx)) { state.dimensions[DIM_ID].completedMits.push(idx); }
                    } else {
                        state.dimensions[DIM_ID].completedMits = state.dimensions[DIM_ID].completedMits.filter(i => i !== idx);
                    }
                    updateProgress(); saveState(); showSaveHint();
                });
            });
            texts.forEach(text => {
                const idx = parseInt(text.dataset.index);
                if (dimState[`mit_${idx}`]) { text.textContent = dimState[`mit_${idx}`]; }
                text.addEventListener('blur', () => {
                    if (!state.dimensions[DIM_ID]) state.dimensions[DIM_ID] = { completedMits: [] };
                    state.dimensions[DIM_ID][`mit_${idx}`] = text.textContent;
                    saveState(); showSaveHint();
                });
            });
            ['vision', 'leverage', 'kpi'].forEach(fieldId => {
                const el = document.getElementById(fieldId);
                el.addEventListener('blur', () => {
                    if (!state.dimensions[DIM_ID]) state.dimensions[DIM_ID] = { completedMits: [] };
                    state.dimensions[DIM_ID][fieldId] = el.value;
                    saveState(); showSaveHint();
                });
            });
            updateProgress();
        }
        function showSaveHint() {
            const hint = document.getElementById('saveHint');
            hint.classList.add('show');
            setTimeout(() => hint.classList.remove('show'), 2000);
        }
        init();
    </script>
</body>
</html>
