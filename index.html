<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 · 年度计划</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;800&family=JetBrains+Mono:wght@300;400;500&display=swap');

        :root {
            --bg: #0a0a0f;
            --fg: #f0f0f5;
            --muted: #6b6b80;
            --accent: #ff6b35;
            --accent-glow: rgba(255, 107, 53, 0.4);
            --card: rgba(20, 20, 30, 0.8);
            --border: rgba(255, 255, 255, 0.08);
            --gradient-1: #ff6b35;
            --gradient-2: #f7931e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 80% 50% at 20% 0%, rgba(255,107,53,0.15) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(247,147,30,0.1) 0%, transparent 50%),
                var(--bg);
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            mask-image: radial-gradient(ellipse 100% 100% at 50% 0%, black 0%, transparent 70%);
        }

        /* Noise texture overlay */
        .noise {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* Main container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Header */
        .hero {
            text-align: center;
            padding: 80px 0 60px;
            position: relative;
        }

        .hero-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            background: var(--card);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: 100px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 6vw, 64px);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--fg) 0%, #a0a0b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 14px;
            color: var(--muted);
            letter-spacing: 0.1em;
        }

        .hero-line {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            margin: 32px auto;
            border-radius: 2px;
        }

        .q2-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-size: 13px;
            font-weight: 500;
        }

        .q2-tag::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* Stats bar */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 48px;
        }

        @media (max-width: 600px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .stat-card:hover {
            border-color: rgba(255,107,53,0.3);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 600;
            color: var(--fg);
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-value .highlight {
            color: var(--accent);
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Grid of dimension cards */
        .dimensions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .dimension-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .dimension-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gradient-1), var(--gradient-2));
            opacity: 0;
            transition: opacity 0.4s;
        }

        .dimension-card:hover {
            border-color: rgba(255,107,53,0.4);
            transform: translateY(-8px);
            box-shadow:
                0 20px 60px rgba(255,107,53,0.15),
                0 0 0 1px rgba(255,107,53,0.1);
        }

        .dimension-card:hover::before {
            opacity: 1;
        }

        .card-icon {
            width: 56px;
            height: 56px;
            margin: 24px auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(247,147,30,0.1));
            border-radius: 14px;
            border: 1px solid rgba(255,107,53,0.2);
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
            color: var(--fg);
            text-align: center;
            padding: 0 20px;
            line-height: 1.4;
        }

        .card-subtitle {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            padding: 10px 24px 24px;
            line-height: 1.6;
            opacity: 0.6;
        }

        .card-progress {
            height: 3px;
            background: rgba(255,255,255,0.05);
            margin: 0 20px 20px;
            border-radius: 2px;
            overflow: hidden;
        }

        .card-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--gradient-1), var(--gradient-2));
            border-radius: 2px;
            transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            width: 0%;
        }

        .card-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--muted);
        }

        .card-stats {
            display: flex;
            gap: 16px;
        }

        .card-stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-stat .done {
            color: #52c41a;
        }

        /* Scroll reveal animation */
        .dimension-card {
            opacity: 0;
            transform: translateY(40px);
        }

        .dimension-card.revealed {
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardReveal {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Focus states */
        .dimension-card:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 4px;
        }

        .dimension-card:focus-visible::before {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="bg-grid"></div>
    <div class="noise"></div>
    <div class="particles" id="particles"></div>

    <main class="main-container">
        <header class="hero">
            <div class="hero-badge">2026 Annual Plan</div>
            <h1>年度计划</h1>
            <div class="hero-line"></div>
            <div class="q2-tag">第二季度 · 5月 - 7月</div>
        </header>

        <section class="stats-row" id="statsRow">
            <div class="stat-card">
                <div class="stat-value"><span id="totalDims" class="highlight">0</span></div>
                <div class="stat-label">维度总数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value"><span id="completedDims" class="highlight">0</span></div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-value"><span id="totalTasks" class="highlight">0</span></div>
                <div class="stat-label">总任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-value"><span id="completedTasks" class="highlight">0</span></div>
                <div class="stat-label">已完成</div>
            </div>
        </section>

        <section class="dimensions-grid" id="dimensionsGrid"></section>
    </main>

    <script>
        const DIMENSIONS = [
            {
                id: 1,
                icon: '👥',
                title: '人际支点',
                subtitle: '在上海建立真实连接，维护远程友谊',
                file: 'dimension-1.html',
                taskCount: 3
            },
            {
                id: 2,
                icon: '💼',
                title: '工作与专业能力',
                subtitle: '在TikTok岗位上实现可量化的专业成果',
                file: 'dimension-2.html',
                taskCount: 3
            },
            {
                id: 3,
                icon: '🤖',
                title: 'AI方向（从需求出发）',
                subtitle: '完成从真实需求出发的可用AI小产品',
                file: 'dimension-3.html',
                taskCount: 3
            },
            {
                id: 4,
                icon: '📈',
                title: '市场嗅觉',
                subtitle: '建立需求发现和验证的日常习惯',
                file: 'dimension-4.html',
                taskCount: 3
            },
            {
                id: 5,
                icon: '💪',
                title: '个人健康',
                subtitle: '体重与肌肉量提升，建立稳定训练习惯',
                file: 'dimension-5.html',
                taskCount: 3
            },
            {
                id: 6,
                icon: '🎨',
                title: '个人技能与兴趣',
                subtitle: '学会自由泳，让摄影写作成为积累出口',
                file: 'dimension-6.html',
                taskCount: 3
            },
            {
                id: 7,
                icon: '💰',
                title: '财务',
                subtitle: '提升储蓄率，副业向杠杆化过渡',
                file: 'dimension-7.html',
                taskCount: 3
            },
            {
                id: 8,
                icon: '📚',
                title: '认知提升（阅读）',
                subtitle: '重建稳定阅读习惯，让阅读撬动其他目标',
                file: 'dimension-8.html',
                taskCount: 3
            }
        ];

        let state = loadState();

        function loadState() {
            const saved = localStorage.getItem('plan2026_state');
            return saved ? JSON.parse(saved) : { dimensions: {} };
        }

        function saveState() {
            localStorage.setItem('plan2026_state', JSON.stringify(state));
        }

        function init() {
            const grid = document.getElementById('dimensionsGrid');

            DIMENSIONS.forEach((dim, index) => {
                const dimState = state.dimensions[dim.id] || { completedMits: [] };
                const completed = dimState.completedMits ? dimState.completedMits.length : 0;
                const progress = dim.taskCount > 0 ? (completed / dim.taskCount) * 100 : 0;

                const card = document.createElement('article');
                card.className = 'dimension-card';
                card.tabIndex = 0;
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = `
                    <div class="card-icon">${dim.icon}</div>
                    <h2 class="card-title">${dim.title}</h2>
                    <p class="card-subtitle">${dim.subtitle}</p>
                    <div class="card-progress">
                        <div class="card-progress-bar" style="width: ${progress}%"></div>
                    </div>
                    <div class="card-footer">
                        <span class="card-stats">
                            <span class="card-stat">
                                <span class="done">${completed}</span>/${dim.taskCount}
                            </span>
                        </span>
                        <span style="font-size: 11px; color: var(--muted);">点击查看详情</span>
                    </div>
                `;

                card.addEventListener('click', () => {
                    window.location.href = dim.file;
                });

                card.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        window.location.href = dim.file;
                    }
                });

                grid.appendChild(card);

                setTimeout(() => card.classList.add('revealed'), index * 100);
            });

            createParticles();
            updateStats();
        }

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDelay = Math.random() * 15 + 's';
                p.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(p);
            }
        }

        function updateStats() {
            let totalCompleted = 0;
            let totalTasks = 0;

            DIMENSIONS.forEach(dim => {
                const dimState = state.dimensions[dim.id] || { completedMits: [] };
                const completed = dimState.completedMits ? dimState.completedMits.length : 0;
                totalCompleted += completed;
                totalTasks += dim.taskCount;
            });

            const completedDims = DIMENSIONS.filter(d => {
                const s = state.dimensions[d.id];
                return s && s.completedMits && s.completedMits.length === d.taskCount;
            }).length;

            document.getElementById('totalDims').textContent = DIMENSIONS.length;
            document.getElementById('completedDims').textContent = completedDims;
            document.getElementById('totalTasks').textContent = totalTasks;
            document.getElementById('completedTasks').textContent = totalCompleted;
        }

        init();
    </script>
</body>
</html>
