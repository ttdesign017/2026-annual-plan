<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年度计划 - Q2个人计划</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .stats-bar {
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 2px solid #e9ecef;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            font-size: 12px;
            color: #6c757d;
            margin-top: 4px;
        }
        .dimension {
            border-bottom: 1px solid #e9ecef;
            padding: 20px 25px;
            transition: background 0.3s;
        }
        .dimension:last-child {
            border-bottom: none;
        }
        .dimension:hover {
            background: #f8f9fa;
        }
        .dimension-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .dimension-toggle {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            border: 2px solid #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #667eea;
            transition: all 0.3s;
        }
        .dimension-toggle.completed {
            background: #667eea;
            color: white;
        }
        .dimension-title {
            font-size: 18px;
            font-weight: 600;
            color: #495057;
            flex: 1;
        }
        .dimension-progress {
            font-size: 13px;
            color: #6c757d;
            margin-right: 12px;
        }
        .dimension-content {
            margin-left: 36px;
            display: none;
        }
        .dimension-content.expanded {
            display: block;
        }
        .field {
            margin-bottom: 12px;
        }
        .field-label {
            font-size: 13px;
            font-weight: 600;
            color: #6c757d;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .field-content {
            font-size: 15px;
            color: #495057;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            min-height: 40px;
            display: flex;
            align-items: center;
        }
        .field-content[contenteditable="true"] {
            background: #fff;
            border: 1px solid #dee2e6;
            cursor: text;
        }
        .field-content[contenteditable="true"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .mit-list {
            list-style: none;
        }
        .mit-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .mit-item:last-child {
            border-bottom: none;
        }
        .mit-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            cursor: pointer;
            accent-color: #667eea;
        }
        .mit-text {
            flex: 1;
            font-size: 15px;
            color: #495057;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .mit-text.completed {
            text-decoration: line-through;
            color: #6c757d;
            background: #f8f9fa;
        }
        .save-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s;
            display: none;
        }
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        .save-btn.show {
            display: block;
        }
        .unsaved-indicator {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #ffc107;
            color: #212529;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: none;
        }
        .unsaved-indicator.show {
            display: block;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 22px; }
            .dimension { padding: 15px 20px; }
            .dimension-content { margin-left: 0; }
            .stats-bar { padding: 10px 5px; }
            .stat-number { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 2026年度计划</h1>
            <p>Q2个人计划（5月–7月）</p>
        </div>
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-number" id="totalDimensions">0</div>
                <div class="stat-label">维度总数</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="completedDimensions">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">总任务</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="completedTasks">0</div>
                <div class="stat-label">已完成</div>
            </div>
        </div>
        <div id="dimensionsContainer"></div>
    </div>
    <button class="save-btn" id="saveBtn" onclick="saveAll()">💾 保存所有更改</button>
    <div class="unsaved-indicator" id="unsavedIndicator">有未保存的更改</div>

    <script>
        const PLAN_DATA = {
            dimensions: [
                {
                    id: 1,
                    title: "👥 人际支点",
                    vision: "在上海建立至少2到3个真实的线下连接，同时把现有的远程友谊维护得更稳定",
                    leverage: "参加至少3次线下活动或社群（摄影、徒步、读书会等兴趣类优先）；每月和上海以外的朋友做一次真正的深度通话，不只是日常闲聊",
                    kpi: "Q2结束时，有至少1个在上海认识的新联系人，见过不止一次；远程朋友的联系频率没有下降",
                    mits: [
                        "搜索本周上海一个感兴趣的线下活动并报名",
                        "给其中一个远程朋友发一条真实的、不是闲聊的消息",
                        "做一次独处的'支点活动'（拍照、走进自然等），记录感受"
                    ]
                },
                {
                    id: 2,
                    title: "💼 工作与专业能力",
                    vision: "在TikTok岗位上有一个可量化的、被认可的专业成果",
                    leverage: "完成一个在工作中可以被拿出来说的项目或改进，有具体的数据或反馈支撑",
                    kpi: "能用一两句话清楚描述'我Q2在工作上做了什么、带来了什么结果'",
                    mits: [
                        "识别本周工作中一个可以主动推进的改进点",
                        "记录一个有意思的用户行为或数据现象",
                        "和一个同事进行一次超出日常协作的真实交流"
                    ]
                },
                {
                    id: 3,
                    title: "🤖 AI方向（从需求出发）",
                    vision: "完成一个从真实需求出发、有人愿意用的AI小产品",
                    leverage: "识别一个具体的、可验证的需求，并完成最小可用版本的交付——哪怕只有三五个人在用",
                    kpi: "有至少一个真实用户（不是自己）使用过这个东西，并给出反馈",
                    mits: [
                        "本周观察或记录一个'这个需求好像没有被很好满足'的场景",
                        "推进当前项目的一个具体功能模块",
                        "给一个潜在用户展示或描述这个想法，收集反应"
                    ]
                },
                {
                    id: 4,
                    title: "📈 市场嗅觉",
                    vision: "建立一套属于自己的需求发现和验证习惯，让它变成日常而不是偶发",
                    leverage: "完成至少3次完整的'发现需求→验证→记录'闭环，更新需求追踪表；在塔罗或AI工具方向完成一次有深度的竞品研究",
                    kpi: "需求追踪表中有不少于6条经过验证的记录；能说清楚在某个关注方向上，真实用户在用什么、为什么用、缺什么",
                    mits: [
                        "记录本周观察到的一个市场信号（小红书、身边人、工作场景均可）",
                        "对其中一条做简单验证（搜索、问人、看数据）",
                        "更新需求追踪表，写下结论而不只是现象"
                    ]
                },
                {
                    id: 5,
                    title: "💪 个人健康",
                    vision: "体重和肌肉量有可见的提升，建立稳定的训练习惯",
                    leverage: "制定可执行的增肌饮食和训练计划并执行满6周；每周完成2次力量训练，记录体重变化",
                    kpi: "Q2结束时体重较现在增加2到3公斤；每周力量训练完成率≥80%；体重变化每两周记录一次，趋势持续向上",
                    mits: [
                        "完成2次力量训练（记录动作、组数、重量）",
                        "记录本周饮食蛋白质摄入是否达标",
                        "每两周测量并记录一次体重"
                    ]
                },
                {
                    id: 6,
                    title: "🎨 个人技能与兴趣",
                    vision: "学会自由泳基础动作；让摄影或写作成为一个真正有积累感的出口",
                    leverage: "报名游泳课并完成至少8次课，能独立完成25米自由泳；完成至少10次有意识的拍摄练习，形成小型作品集；写至少6篇反思性文字",
                    kpi: "Q2结束时能独立完成25米自由泳不停歇；能挑出3张自己满意的照片；写作习惯每两周至少一次",
                    mits: [
                        "完成一次游泳课或自主练习",
                        "带着一个明确主题出去拍一次",
                        "写一段这周的观察或感受，不少于200字"
                    ]
                },
                {
                    id: 7,
                    title: "💰 财务",
                    vision: "储蓄率稳步提升；副业收入开始从'以时间换钱'向'用杠杆换钱'过渡；投资知识框架初步建立",
                    leverage: "坚持记账整个Q2；梳理现有副业结构，识别至少一个可以'做一次、持续产生价值'的杠杆化方向并完成初步验证；读完一本投资入门书并输出自己的框架笔记",
                    kpi: "Q2储蓄率较现在提升；至少形成一个杠杆化副业方向的具体方案（不要求完成，要求想清楚）；能用自己的话解释3个投资基础概念",
                    mits: [
                        "记录本周收支",
                        "思考或推进一个'可复用、不完全依赖时间投入'的副业模块",
                        "读投资相关内容20分钟并记录一个新认知"
                    ]
                },
                {
                    id: 8,
                    title: "📚 认知提升（阅读）",
                    vision: "重新建立稳定的阅读习惯，让阅读成为撬动其他目标的杠杆",
                    leverage: "Q2完成6本书（每两周1本）；阅读方向聚焦市场与商业认知、AI与技术趋势、心理与自我认知三个领域，每本书输出一段核心收获笔记",
                    kpi: "6本书完成率100%；每本书有不少于200字的笔记，明确写出'这本书如何影响了我的某个具体目标或决策'",
                    mits: [
                        "每日阅读30分钟，标注关键观点",
                        "周末完成当周阅读内容的简短笔记（核心观点+个人关联）",
                        "每两周选定下一本书，确保书单与当前最重要的目标方向对齐"
                    ]
                }
            ]
        };

        let state = loadState();

        function loadState() {
            const saved = localStorage.getItem('plan2026_state');
            if (saved) {
                try {
                    return JSON.parse(saved);
                } catch (e) {
                    console.warn('Failed to load state:', e);
                }
            }
            return { dimensions: {}, edits: {} };
        }

        function saveState() {
            localStorage.setItem('plan2026_state', JSON.stringify(state));
        }

        function init() {
            const container = document.getElementById('dimensionsContainer');
            PLAN_DATA.dimensions.forEach((dim, index) => {
                const dimId = dim.id;
                const dimState = state.dimensions[dimId] || { completedMits: [], expanded: index === 0 };

                const dimEl = document.createElement('div');
                dimEl.className = 'dimension';
                dimEl.id = `dim-${dimId}`;

                const completed = dimState.completedMits || [];
                const allComplete = completed.length === dim.mits.length;

                dimEl.innerHTML = `
                    <div class="dimension-header" onclick="toggleDimension(${dimId})">
                        <div class="dimension-toggle ${allComplete ? 'completed' : ''}" id="toggle-${dimId}">${allComplete ? '✓' : (completed.length > 0 ? completed.length : '')}</div>
                        <div class="dimension-title">${dim.title}</div>
                        <div class="dimension-progress" id="progress-${dimId}">${completed.length}/${dim.mits.length}</div>
                    </div>
                    <div class="dimension-content ${dimState.expanded ? 'expanded' : ''}" id="content-${dimId}">
                        <div class="field">
                            <div class="field-label">愿景句</div>
                            <div class="field-content" contenteditable="true"
                                 oninput="markUnsaved()"
                                 onblur="saveField(${dimId}, 'vision', this.innerText)"
                                 id="vision-${dimId}">${state.edits[`${dimId}_vision`] || dim.vision}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">Q2杠杆成果</div>
                            <div class="field-content" contenteditable="true"
                                 oninput="markUnsaved()"
                                 onblur="saveField(${dimId}, 'leverage', this.innerText)"
                                 id="leverage-${dimId}">${state.edits[`${dimId}_leverage`] || dim.leverage}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">关键指标</div>
                            <div class="field-content" contenteditable="true"
                                 oninput="markUnsaved()"
                                 onblur="saveField(${dimId}, 'kpi', this.innerText)"
                                 id="kpi-${dimId}">${state.edits[`${dimId}_kpi`] || dim.kpi}</div>
                        </div>
                        <div class="field">
                            <div class="field-label">每周MIT举例</div>
                            <ul class="mit-list" id="mit-list-${dimId}">
                                ${dim.mits.map((mit, i) => `
                                    <li class="mit-item">
                                        <input type="checkbox"
                                               class="mit-checkbox"
                                               id="mit-${dimId}-${i}"
                                               ${completed.includes(i) ? 'checked' : ''}
                                               onchange="toggleMit(${dimId}, ${i})">
                                        <div class="field-content mit-text ${completed.includes(i) ? 'completed' : ''}"
                                             contenteditable="true"
                                             oninput="markUnsaved()"
                                             onblur="saveField(${dimId}, 'mit_${i}', this.innerText)"
                                             id="mit-text-${dimId}-${i}">${state.edits[`${dimId}_mit_${i}`] || mit}</div>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>
                `;
                container.appendChild(dimEl);
            });
            updateStats();
        }

        function toggleDimension(dimId) {
            const content = document.getElementById(`content-${dimId}`);
            const toggle = document.getElementById(`toggle-${dimId}`);
            const isExpanded = content.classList.contains('expanded');

            if (!isExpanded) {
                content.classList.add('expanded');
                toggle.textContent = document.querySelectorAll(`#mit-list-${dimId} input:checked`).length || '';
            } else {
                content.classList.remove('expanded');
            }

            // Save expanded state
            if (!state.dimensions[dimId]) state.dimensions[dimId] = { completedMits: [] };
            state.dimensions[dimId].expanded = !isExpanded;
            saveState();
        }

        function toggleMit(dimId, mitIndex) {
            const checkbox = document.getElementById(`mit-${dimId}-${mitIndex}`);
            const textEl = document.getElementById(`mit-text-${dimId}-${mitIndex}`);

            if (!state.dimensions[dimId]) state.dimensions[dimId] = { completedMits: [] };

            if (checkbox.checked) {
                state.dimensions[dimId].completedMits.push(mitIndex);
                textEl.classList.add('completed');
            } else {
                state.dimensions[dimId].completedMits = state.dimensions[dimId].completedMits.filter(i => i !== mitIndex);
                textEl.classList.remove('completed');
            }

            updateDimProgress(dimId);
            updateStats();
            saveState();
            markUnsaved();
        }

        function updateDimProgress(dimId) {
            const dimData = PLAN_DATA.dimensions.find(d => d.id === dimId);
            const dimState = state.dimensions[dimId] || { completedMits: [] };
            const completed = dimState.completedMits.length;
            const total = dimData.mits.length;

            document.getElementById(`progress-${dimId}`).textContent = `${completed}/${total}`;

            const toggle = document.getElementById(`toggle-${dimId}`);
            if (completed === total && total > 0) {
                toggle.classList.add('completed');
                toggle.textContent = '✓';
            } else {
                toggle.classList.remove('completed');
                toggle.textContent = completed > 0 ? completed : '';
            }
        }

        function updateStats() {
            const totalDims = PLAN_DATA.dimensions.length;
            const completedDims = PLAN_DATA.dimensions.filter(d => {
                const s = state.dimensions[d.id];
                return s && s.completedMits && s.completedMits.length === d.mits.length;
            }).length;
            const totalTasks = PLAN_DATA.dimensions.reduce((sum, d) => sum + d.mits.length, 0);
            const completedTasks = PLAN_DATA.dimensions.reduce((sum, d) => {
                const s = state.dimensions[d.id];
                return sum + (s && s.completedMits ? s.completedMits.length : 0);
            }, 0);

            document.getElementById('totalDimensions').textContent = totalDims;
            document.getElementById('completedDimensions').textContent = completedDims;
            document.getElementById('totalTasks').textContent = totalTasks;
            document.getElementById('completedTasks').textContent = completedTasks;
        }

        function saveField(dimId, field, value) {
            state.edits[`${dimId}_${field}`] = value;
            saveState();
            markUnsaved();
        }

        let unsavedTimeout;
        function markUnsaved() {
            document.getElementById('saveBtn').classList.add('show');
            document.getElementById('unsavedIndicator').classList.add('show');
            clearTimeout(unsavedTimeout);
            unsavedTimeout = setTimeout(() => {
                document.getElementById('unsavedIndicator').classList.remove('show');
            }, 3000);
        }

        function saveAll() {
            saveState();
            document.getElementById('saveBtn').classList.remove('show');
            document.getElementById('unsavedIndicator').classList.remove('show');

            // Show confirmation
            const btn = document.getElementById('saveBtn');
            const original = btn.innerHTML;
            btn.innerHTML = '✅ 已保存!';
            setTimeout(() => {
                btn.innerHTML = original;
            }, 2000);
        }

        // Initialize on load
        window.onload = init;
    </script>
</body>
</html>
